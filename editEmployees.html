<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Baker</title>
    <link rel="stylesheet" href="editEmployees.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

</head>
<body>
    <header>
        <h1>The Baker</h1>
        <button onclick="goBack()" class="logo-button">
            <i class="fa-solid fa-house"></i>
        </button>
    </header>

    <main>
        <section>
            <h2>Current Employees</h2>
            <ul id="employee-list">
                <!-- Employee list will be populated dynamically -->
            </ul>
        </section>
        <section>
            <h2>Add Employee</h2>
            <input type="text" id="new-employee" placeholder="Enter employee name">
            <button onclick="addEmployee()">Add Employee</button>
        </section>
        <section class="controls">
            <button onclick="saveChanges()">Save Changes</button>
            <button onclick="loadEmployees()">Load Employees</button>
            <button onclick="resetEmployees()">Reset Employees</button>
        </section>
    </main>
    <footer>
        <p>&copy; Anas Taimah. All Rights Reserved.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
